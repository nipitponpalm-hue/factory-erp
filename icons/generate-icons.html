<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<p id="status">กำลังสร้างไอคอน...</p>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.156;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#2A4D2C';
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.55}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('F', size / 2, size / 2 + size * 0.03);
}

function download(canvas, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

window.onload = function() {
  const c192 = document.getElementById('c192');
  const c512 = document.getElementById('c512');
  drawIcon(c192, 192);
  drawIcon(c512, 512);
  setTimeout(() => {
    download(c192, 'icon-192.png');
    setTimeout(() => {
      download(c512, 'icon-512.png');
      document.getElementById('status').textContent = 'เสร็จแล้ว! บันทึกไฟล์ icon-192.png และ icon-512.png ลงโฟลเดอร์ icons/ ด้วยนะครับ';
    }, 500);
  }, 300);
};
</script>
</body>
</html>

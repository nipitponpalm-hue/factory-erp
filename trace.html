.trace-box { background:var(--surface); border:1.5px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:10px; }
.trace-box-title { font-size:12px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; }
.trace-arrow { text-align:center; color:var(--green-deep); font-size:20px; margin:6px 0; }
.trace-chain { padding:0 8px; }
.trace-node { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; background:var(--bg); border-radius:8px; margin-bottom:6px; border-left:3px solid var(--green-deep); }
.trace-node.rm { border-left-color:#3B82F6; }
.trace-node.fg { border-left-color:#10B981; }
.trace-node.do { border-left-color:#F59E0B; }
.trace-node-icon { font-size:18px; margin-top:2px; }
.trace-node-body { flex:1; }
.trace-node-lot { font-size:13px; font-weight:700; color:var(--ink-deep); }
.trace-node-sub { font-size:12px; color:var(--ink-soft); margin-top:2px; line-height:1.6; }
.mode-tabs { display:flex; gap:8px; margin-bottom:18px; }
.mode-tab { padding:9px 20px; border-radius:8px; border:1.5px solid var(--line); background:transparent; font-family:inherit; font-size:13.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; transition:.15s; }
.mode-tab.active { background:var(--green-deep); color:#fff; border-color:var(--green-deep); }
</style>

          <label>ค้นหาด้วย FG Lot หรือเลขที่ใบจ่าย (DO)</label>
          <input type="text" id="bwSearch" placeholder="เช่น FG260629001 หรือ DO260629001" style="width:100%;" autocomplete="off">
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:2px;">
          <button class="btn btn-primary" id="bwSearchBtn">ค้นหา</button>
        </div>
      </div>
      <div id="bwSuggest" style="display:none;background:var(--surface);border:1.5px solid var(--line);border-radius:8px;margin-top:4px;max-height:200px;overflow-y:auto;"></div>
    </div>

    <!-- FORWARD: เริ่มจาก RM Lot -->
    <div id="modeForward" style="display:none;">
      <div class="row">
        <div class="field-lg">
          <label>ค้นหาด้วย RM Lot</label>
          <input type="text" id="fwSearch" placeholder="เช่น RM260629001" style="width:100%;" autocomplete="off">
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:2px;">
          <button class="btn btn-primary" id="fwSearchBtn">ค้นหา</button>
        </div>
      </div>
      <div id="fwSuggest" style="display:none;background:var(--surface);border:1.5px solid var(--line);border-radius:8px;margin-top:4px;max-height:200px;overflow-y:auto;"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script>
(function(){

let mode = 'backward';

window.setMode = function(m) {
  mode = m;
  document.getElementById('modeBackward').style.display = m==='backward'?'block':'none';
  document.getElementById('modeForward').style.display  = m==='forward'?'block':'none';
  document.getElementById('tabBackward').classList.toggle('active', m==='backward');
  document.getElementById('tabForward').classList.toggle('active', m==='forward');
  document.getElementById('resultWrap').style.display='none';
  document.getElementById('noResult').style.display='none';
};

// ===== BACKWARD AUTOCOMPLETE =====
let bwTimer;
document.getElementById('bwSearch').addEventListener('input', e => {
  clearTimeout(bwTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { document.getElementById('bwSuggest').style.display='none'; return; }
  bwTimer = setTimeout(()=>bwAutocomplete(q), 300);
});

async function bwAutocomplete(q) {
  const [fgRes, doRes] = await Promise.all([
    db.from('fg_lots').select('id,lot_number,products(name)').ilike('lot_number',`%${q}%`).limit(8),
    db.from('dispatch_orders').select('id,do_number,customers(name)').ilike('do_number',`%${q}%`).limit(8),
  ]);
  const items = [
    ...(fgRes.data||[]).map(r=>({ type:'fg', id:r.id, label:`🟩 ${r.lot_number}`, sub:r.products?.name||'' })),
    ...(doRes.data||[]).map(r=>({ type:'do', id:r.id, label:`🟧 ${r.do_number}`, sub:r.customers?.name||'' })),
  ];
  const sug = document.getElementById('bwSuggest');
  if (!items.length) { sug.style.display='none'; return; }
  sug.innerHTML = items.map((it,i)=>`<div class="combo-item" style="padding:10px 14px;cursor:pointer;" data-idx="${i}">
    <b>${it.label}</b> <span style="color:var(--ink-soft);font-size:12px;">${it.sub}</span>
  </div>`).join('');
  sug.style.display='block';
  sug.querySelectorAll('.combo-item').forEach((el,i)=>{
    el.addEventListener('click',()=>{
      sug.style.display='none';
      document.getElementById('bwSearch').value=items[i].label.replace(/^[^ ]+ /,'');
      if (items[i].type==='fg') traceBackwardFromFG(items[i].id);
      else traceBackwardFromDO(items[i].id);
    });
  });
}

document.getElementById('bwSearchBtn').addEventListener('click', async ()=>{
  const q = document.getElementById('bwSearch').value.trim();
  if (!q) return;
  showLoading(true);
  // ลองหา FG Lot ก่อน แล้วค่อย DO
  const { data:fg } = await db.from('fg_lots').select('id,lot_number').ilike('lot_number',q).limit(1);
  if (fg?.length) { await traceBackwardFromFG(fg[0].id); showLoading(false); return; }
  const { data:doR } = await db.from('dispatch_orders').select('id,do_number').ilike('do_number',q).limit(1);
  if (doR?.length) { await traceBackwardFromDO(doR[0].id); showLoading(false); return; }
  showLoading(false);
  document.getElementById('resultWrap').style.display='none';
  document.getElementById('noResult').style.display='block';
});

// ===== BACKWARD: FG Lot → RM Lots → Suppliers =====
async function traceBackwardFromFG(fgLotId) {
  showLoading(true);
  try {
    const { data:fg } = await db.from('fg_lots')
      .select('lot_number,produced_date,exp_date,initial_qty,unit,status,products(sku,name),production_orders(po_number,production_date,operator)')
      .eq('id',fgLotId).single();

    // dispatch
    const { data:dis } = await db.from('dispatch_items')
      .select('qty,dispatch_orders(do_number,dispatch_date,customers(name))')
      .eq('fg_lot_id',fgLotId);

    // RM inputs ที่ใช้ผลิต
    const { data:po } = await db.from('fg_lots').select('po_id').eq('id',fgLotId).single();
    let rmInputs=[];
    if (po?.po_id) {
      const { data:inp } = await db.from('production_inputs')
        .select('qty_used,rm_lots(lot_number,receive_date,exp_date,unit,suppliers(name),materials(sku,name),receive_items(receive_orders(ro_number)))')
        .eq('po_id',po.po_id);
      rmInputs = inp||[];
    }

    renderBackwardFG(fg, rmInputs, dis||[]);
  } finally { showLoading(false); }
}

function renderBackwardFG(fg, rmInputs, dispatches) {
  document.getElementById('resultTitle').textContent=`Backward Trace — FG Lot: ${fg.lot_number}`;

  let html = '';

  // RM Nodes
  if (rmInputs.length) {
    html += `<div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;">📦 วัตถุดิบที่ใช้ผลิต</div>`;
    rmInputs.forEach(r=>{
      const lot=r.rm_lots;
      const ro=lot?.receive_items?.[0]?.receive_orders;
      html+=`<div class="trace-node rm">
        <div class="trace-node-icon">🟦</div>
        <div class="trace-node-body">
          <div class="trace-node-lot">${lot?.lot_number||'-'}</div>
          <div class="trace-node-sub">
            วัตถุดิบ: ${lot?.materials?.name||'-'} (${lot?.materials?.sku||'-'})<br>
            Supplier: <b>${lot?.suppliers?.name||'-'}</b>
            ${ro?` &nbsp;|&nbsp; ใบรับ: ${ro.ro_number}`:''}<br>
            วันรับ: ${lot?.receive_date?fmtDate(lot.receive_date):'-'}
            ${lot?.exp_date?` &nbsp;|&nbsp; EXP: ${fmtDate(lot.exp_date)}`:''}<br>
            จำนวนที่ใช้: <b>${fmtQty(r.qty_used)} ${lot?.unit||''}</b>
          </div>
        </div>
      </div>`;
    });
    html+=`<div class="trace-arrow">↓</div>`;
  }

  // Production Node
  const po=fg.production_orders;
  if(po) {
    html+=`<div class="trace-node" style="border-left-color:#8B5CF6;">
      <div class="trace-node-icon">⚙️</div>
      <div class="trace-node-body">
        <div class="trace-node-lot">${po.po_number}</div>
        <div class="trace-node-sub">ผลิตโดย: ${po.operator} &nbsp;|&nbsp; วันผลิต: ${fmtDT(po.production_date)}</div>
      </div>
    </div>`;
    html+=`<div class="trace-arrow">↓</div>`;
  }

  // FG Node
  html+=`<div class="trace-node fg">
    <div class="trace-node-icon">🟩</div>
    <div class="trace-node-body">
      <div class="trace-node-lot">${fg.lot_number}</div>
      <div class="trace-node-sub">
        สินค้า: ${fg.products?.name||'-'} (${fg.products?.sku||'-'})<br>
        MFG: ${fg.produced_date?fmtDate(fg.produced_date):'-'} &nbsp;|&nbsp; EXP: ${fg.exp_date?fmtDate(fg.exp_date):'-'}<br>
        จำนวน: <b>${fmtQty(fg.initial_qty)} ${fg.unit}</b> &nbsp;|&nbsp; สถานะ: <span class="status-badge s-${fg.status}" style="font-size:11px;">${fg.status}</span>
      </div>
    </div>
  </div>`;

  // Dispatch Nodes
  if (dispatches.length) {
    html+=`<div class="trace-arrow">↓</div>`;
    html+=`<div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;">🚚 การจ่ายสินค้า</div>`;
    dispatches.forEach(d=>{
      const doRec=d.dispatch_orders;
      html+=`<div class="trace-node do">
        <div class="trace-node-icon">🟧</div>
        <div class="trace-node-body">
          <div class="trace-node-lot">${doRec?.do_number||'-'}</div>
          <div class="trace-node-sub">
            ลูกค้า: <b>${doRec?.customers?.name||'-'}</b><br>
            วันจ่าย: ${doRec?.dispatch_date?fmtDT(doRec.dispatch_date):'-'} &nbsp;|&nbsp; จำนวน: <b>${fmtQty(d.qty)} ${fg.unit}</b>
          </div>
        </div>
      </div>`;
    });
  } else {
    html+=`<div style="font-size:13px;color:var(--ink-soft);padding:10px 0;">ยังไม่มีการจ่ายสินค้า</div>`;
  }

  document.getElementById('traceChain').innerHTML=html;
  document.getElementById('resultWrap').style.display='block';
  document.getElementById('noResult').style.display='none';
}

// ===== BACKWARD: DO → FG Lots → RM =====
async function traceBackwardFromDO(doId) {
  const [doRes, itemsRes] = await Promise.all([
    db.from('dispatch_orders').select('do_number,dispatch_date,operator,customers(name)').eq('id',doId).single(),
    db.from('dispatch_items').select('qty,rm_lot_id,fg_lot_id').eq('do_id',doId),
  ]);

  if (!doRes.data) { document.getElementById('noResult').style.display='block'; return; }
  const doRec  = doRes.data;
  const items  = itemsRes.data||[];

  // ดึง lot info แยก
  const rmIds = items.filter(i=>i.rm_lot_id).map(i=>i.rm_lot_id);
  const fgIds = items.filter(i=>i.fg_lot_id).map(i=>i.fg_lot_id);
  const [rmRes, fgRes] = await Promise.all([
    rmIds.length ? db.from('rm_lots').select('id,lot_number,materials(name,sku)').in('id',rmIds) : {data:[]},
    fgIds.length ? db.from('fg_lots').select('id,lot_number,products(name,sku)').in('id',fgIds) : {data:[]},
  ]);
  const rmMap = Object.fromEntries((rmRes.data||[]).map(r=>[r.id,r]));
  const fgMap = Object.fromEntries((fgRes.data||[]).map(r=>[r.id,r]));

  document.getElementById('resultTitle').textContent=`Backward Trace — ใบจ่าย: ${doRec.do_number}`;
  let html=`<div class="trace-node do" style="margin-bottom:12px;">
    <div class="trace-node-icon">🟧</div>
    <div class="trace-node-body">
      <div class="trace-node-lot">${doRec.do_number}</div>
      <div class="trace-node-sub">ลูกค้า: <b>${doRec.customers?.name||'-'}</b> &nbsp;|&nbsp; วันจ่าย: ${fmtDT(doRec.dispatch_date)}</div>
    </div>
  </div>
  <div class="trace-arrow">↑ ย้อนหา</div>`;

  if (!items.length) {
    html+=`<div style="font-size:13px;color:var(--ink-soft);padding:8px;">ไม่พบรายการในใบจ่ายนี้</div>`;
  } else {
    items.forEach(it=>{
      const isRm = !!it.rm_lot_id;
      const lot  = isRm ? rmMap[it.rm_lot_id] : fgMap[it.fg_lot_id];
      const prod = isRm ? lot?.materials : lot?.products;
      if (isRm) {
        // RM ขายตรง → แสดง RM node แล้ว trace ต่อได้
        html+=`<div class="trace-node rm" style="cursor:pointer;" onclick="traceRMDirect('${it.rm_lot_id}')">
          <div class="trace-node-icon">🟦</div>
          <div class="trace-node-body">
            <div class="trace-node-lot">${lot?.lot_number||'-'} <span style="font-size:11px;color:#3B82F6;">→ คลิกเพื่อ Trace ย้อนหลัง</span></div>
            <div class="trace-node-sub">${prod?.name||'-'} (${prod?.sku||'-'}) &nbsp;|&nbsp; จำนวน: ${fmtQty(it.qty)} &nbsp;|&nbsp; <b>จ่ายตรง (ไม่แปรรูป)</b></div>
          </div>
        </div>`;
      } else {
        // FG → trace ต่อไปได้
        html+=`<div class="trace-node fg" style="cursor:pointer;" onclick="traceFGFromDO('${it.fg_lot_id}')">
          <div class="trace-node-icon">🟩</div>
          <div class="trace-node-body">
            <div class="trace-node-lot">${lot?.lot_number||'-'} <span style="font-size:11px;color:var(--green-deep);">→ คลิกเพื่อ Trace ย้อนหลัง</span></div>
            <div class="trace-node-sub">${prod?.name||'-'} (${prod?.sku||'-'}) &nbsp;|&nbsp; จำนวน: ${fmtQty(it.qty)}</div>
          </div>
        </div>`;
      }
    });
  }

  document.getElementById('traceChain').innerHTML=html;
  document.getElementById('resultWrap').style.display='block';
  document.getElementById('noResult').style.display='none';
}

window.traceFGFromDO = async function(fgLotId) {
  showLoading(true);
  await traceBackwardFromFG(fgLotId);
  showLoading(false);
};

window.traceRMDirect = async function(rmLotId) {
  showLoading(true);
  // RM จ่ายตรง → แสดง RM node + Supplier
  const { data:rm } = await db.from('rm_lots')
    .select('lot_number,receive_date,exp_date,initial_qty,unit,status,materials(sku,name),suppliers(name),receive_items(receive_orders(ro_number))')
    .eq('id',rmLotId).single();
  if (!rm) { showLoading(false); return; }
  const ro = rm.receive_items?.[0]?.receive_orders;
  document.getElementById('resultTitle').textContent=`Backward Trace — RM Lot: ${rm.lot_number}`;
  document.getElementById('traceChain').innerHTML=`
    <div class="trace-node rm">
      <div class="trace-node-icon">🟦</div>
      <div class="trace-node-body">
        <div class="trace-node-lot">${rm.lot_number}</div>
        <div class="trace-node-sub">
          วัตถุดิบ: ${rm.materials?.name||'-'} (${rm.materials?.sku||'-'})<br>
          Supplier: <b>${rm.suppliers?.name||'-'}</b>${ro?` &nbsp;|&nbsp; ใบรับ: ${ro.ro_number}`:''}<br>
          วันรับ: ${rm.receive_date?fmtDate(rm.receive_date):'-'}${rm.exp_date?` &nbsp;|&nbsp; EXP: ${fmtDate(rm.exp_date)}`:''}<br>
          จำนวนทั้งหมด: <b>${fmtQty(rm.initial_qty)} ${rm.unit}</b> &nbsp;|&nbsp; <b style="color:var(--green-deep);">จ่ายตรงให้ลูกค้า (ไม่ผ่านการแปรรูป)</b>
        </div>
      </div>
    </div>`;
  document.getElementById('resultWrap').style.display='block';
  document.getElementById('noResult').style.display='none';
  showLoading(false);
};

// ===== FORWARD AUTOCOMPLETE =====
let fwTimer;
document.getElementById('fwSearch').addEventListener('input', e=>{
  clearTimeout(fwTimer);
  const q=e.target.value.trim();
  if (q.length<2){ document.getElementById('fwSuggest').style.display='none'; return; }
  fwTimer=setTimeout(()=>fwAutocomplete(q),300);
});

async function fwAutocomplete(q) {
  const { data } = await db.from('rm_lots')
    .select('id,lot_number,materials(name)')
    .ilike('lot_number',`%${q}%`).limit(10);
  const sug=document.getElementById('fwSuggest');
  if (!data?.length){ sug.style.display='none'; return; }
  sug.innerHTML=(data||[]).map((r,i)=>`<div class="combo-item" style="padding:10px 14px;cursor:pointer;" data-idx="${i}">
    <b class="lot-num">${r.lot_number}</b> <span style="color:var(--ink-soft);font-size:12px;">${r.materials?.name||''}</span>
  </div>`).join('');
  sug.style.display='block';
  sug.querySelectorAll('.combo-item').forEach((el,i)=>{
    el.addEventListener('click',()=>{
      sug.style.display='none';
      document.getElementById('fwSearch').value=data[i].lot_number;
      traceForwardFromRM(data[i].id);
    });
  });
}

document.getElementById('fwSearchBtn').addEventListener('click', async()=>{
  const q=document.getElementById('fwSearch').value.trim();
  if (!q) return;
  showLoading(true);
  const { data } = await db.from('rm_lots').select('id').ilike('lot_number',q).limit(1);
  if (data?.length) { await traceForwardFromRM(data[0].id); }
  else { document.getElementById('resultWrap').style.display='none'; document.getElementById('noResult').style.display='block'; }
  showLoading(false);
});

// ===== FORWARD: RM → PO → FG → DO =====
async function traceForwardFromRM(rmLotId) {
  showLoading(true);
  try {
    const { data:rm } = await db.from('rm_lots')
      .select('lot_number,receive_date,exp_date,initial_qty,unit,status,materials(sku,name),suppliers(name),receive_items(receive_orders(ro_number,receive_date))')
      .eq('id',rmLotId).single();

    // production inputs ที่ใช้ lot นี้
    const { data:inputs } = await db.from('production_inputs')
      .select('qty_used,po_id,production_orders(po_number,production_date,operator,fg_lots(id,lot_number,products(name,sku),produced_date,exp_date,initial_qty,unit,status,dispatch_items(qty,dispatch_orders(do_number,dispatch_date,customers(name)))))')
      .eq('lot_id',rmLotId);

    renderForwardRM(rm, inputs||[]);
  } finally { showLoading(false); }
}

function renderForwardRM(rm, inputs) {
  document.getElementById('resultTitle').textContent=`Forward Trace — RM Lot: ${rm.lot_number}`;
  const ro=rm.receive_items?.[0]?.receive_orders;
  let html=``;

  // Supplier / RO
  html+=`<div class="trace-node rm">
    <div class="trace-node-icon">🟦</div>
    <div class="trace-node-body">
      <div class="trace-node-lot">${rm.lot_number}</div>
      <div class="trace-node-sub">
        วัตถุดิบ: ${rm.materials?.name||'-'} (${rm.materials?.sku||'-'})<br>
        Supplier: <b>${rm.suppliers?.name||'-'}</b>${ro?` &nbsp;|&nbsp; ใบรับ: ${ro.ro_number}`:''}<br>
        วันรับ: ${rm.receive_date?fmtDate(rm.receive_date):'-'} ${rm.exp_date?`&nbsp;|&nbsp; EXP: ${fmtDate(rm.exp_date)}`:''}<br>
        จำนวน: <b>${fmtQty(rm.initial_qty)} ${rm.unit}</b> &nbsp;|&nbsp; สถานะ: <span class="status-badge s-${rm.status}" style="font-size:11px;">${rm.status}</span>
      </div>
    </div>
  </div>`;

  if (!inputs.length) {
    html+=`<div style="font-size:13px;color:var(--ink-soft);padding:10px 0;">ยังไม่มีการนำไปผลิต</div>`;
  } else {
    inputs.forEach(inp=>{
      const po=inp.production_orders;
      const fgLots=po?.fg_lots||[];
      html+=`<div class="trace-arrow">↓</div>`;
      html+=`<div class="trace-node" style="border-left-color:#8B5CF6;">
        <div class="trace-node-icon">⚙️</div>
        <div class="trace-node-body">
          <div class="trace-node-lot">${po?.po_number||'-'}</div>
          <div class="trace-node-sub">ผลิตโดย: ${po?.operator||'-'} &nbsp;|&nbsp; วันผลิต: ${po?.production_date?fmtDT(po.production_date):'-'}<br>จำนวนที่ใช้จาก Lot นี้: <b>${fmtQty(inp.qty_used)} ${rm.unit}</b></div>
        </div>
      </div>`;
      fgLots.forEach(fg=>{
        const dispatches=fg.dispatch_items||[];
        html+=`<div class="trace-arrow">↓</div>`;
        html+=`<div class="trace-node fg">
          <div class="trace-node-icon">🟩</div>
          <div class="trace-node-body">
            <div class="trace-node-lot">${fg.lot_number}</div>
            <div class="trace-node-sub">
              สินค้า: ${fg.products?.name||'-'} (${fg.products?.sku||'-'})<br>
              MFG: ${fg.produced_date?fmtDate(fg.produced_date):'-'} &nbsp;|&nbsp; EXP: ${fg.exp_date?fmtDate(fg.exp_date):'-'}<br>
              จำนวน: <b>${fmtQty(fg.initial_qty)} ${fg.unit}</b>
            </div>
          </div>
        </div>`;
        if (dispatches.length) {
          dispatches.forEach(d=>{
            html+=`<div class="trace-arrow">↓</div>`;
            html+=`<div class="trace-node do">
              <div class="trace-node-icon">🟧</div>
              <div class="trace-node-body">
                <div class="trace-node-lot">${d.dispatch_orders?.do_number||'-'}</div>
                <div class="trace-node-sub">ลูกค้า: <b>${d.dispatch_orders?.customers?.name||'-'}</b><br>วันจ่าย: ${d.dispatch_orders?.dispatch_date?fmtDT(d.dispatch_orders.dispatch_date):'-'} &nbsp;|&nbsp; จำนวน: <b>${fmtQty(d.qty)} ${fg.unit}</b></div>
              </div>
            </div>`;
          });
        } else {
          html+=`<div style="font-size:13px;color:var(--ink-soft);padding:6px 0 6px 24px;">ยังไม่มีการจ่ายสินค้า FG Lot นี้</div>`;
        }
      });
    });
  }

  document.getElementById('traceChain').innerHTML=html;
  document.getElementById('resultWrap').style.display='block';
  document.getElementById('noResult').style.display='none';
}

})();
</script>
</body>
</html>
